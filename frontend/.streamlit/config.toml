[theme]
primaryColor = "#e94560"
backgroundColor = "#1a1a2e"
secondaryBackgroundColor = "#16213e"
textColor = "#e0e0e0"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"
maxUploadSize = 500

[logger]
level = "info"

[client.showRunningSessionState]
runButtonPosition = "sticky"

[browser]
gatherUsageStats = false

[server]
runOnSave = true
maxUploadSize = 500
enableXsrfProtection = true
