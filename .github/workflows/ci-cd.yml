name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movie_recommender
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libpq-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Load database schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d movie_recommender -f backend/db/schema.sql

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: movie_recommender
          SECRET_KEY: ci-test-secret-key
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
        run: pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create ECR repositories if they don't exist
        run: |
          aws ecr describe-repositories --repository-names movie-recommender-backend || \
            aws ecr create-repository --repository-name movie-recommender-backend
          aws ecr describe-repositories --repository-names movie-recommender-frontend || \
            aws ecr create-repository --repository-name movie-recommender-frontend

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/movie-recommender-backend:latest
            ${{ steps.ecr-login.outputs.registry }}/movie-recommender-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend-react/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/movie-recommender-frontend:latest
            ${{ steps.ecr-login.outputs.registry }}/movie-recommender-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------
      # TODO (Phase 4/7): Once ECR/RDS/ECS infrastructure exists, add a
      # deploy step here that updates the ECS task definition with the
      # new image tags (${{ github.sha }}) and triggers
      # `aws ecs update-service --force-new-deployment` (or uses
      # aws-actions/amazon-ecs-deploy-task-definition).
      # ---------------------------------------------------------------
